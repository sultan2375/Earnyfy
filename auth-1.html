<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Earnify – Login / Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a12;
      --card: #13131f;
      --card2: #1a1a2e;
      --purple: #7c3aed;
      --purple2: #9d5cf6;
      --purple-light: #a855f7;
      --green: #22c55e;
      --text: #ffffff;
      --text2: #a0a0b8;
      --border: rgba(255,255,255,0.08);
      --red: #ef4444;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* BG Blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .blob1 { width: 500px; height: 500px; background: rgba(124,58,237,0.18); top: -150px; right: -150px; }
    .blob2 { width: 400px; height: 400px; background: rgba(168,85,247,0.1); bottom: -100px; left: -100px; }

    /* ===== WRAPPER ===== */
    .auth-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      padding: 20px;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 1.5rem;
      font-weight: 800;
      color: #fff;
      text-decoration: none;
      margin-bottom: 28px;
    }

    .logo-icon {
      background: var(--purple);
      border-radius: 10px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    /* Card */
    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    /* Toggle Tabs */
    .tab-row {
      display: flex;
      background: var(--card2);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .tab-btn.active {
      background: var(--purple);
      color: #fff;
      box-shadow: 0 4px 16px rgba(124,58,237,0.35);
    }

    /* Form title */
    .form-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 4px; }
    .form-sub { font-size: 0.82rem; color: var(--text2); margin-bottom: 24px; }

    /* Input group */
    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 6px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text2);
      font-size: 0.85rem;
    }

    .input-wrap input {
      width: 100%;
      background: var(--card2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px 12px 40px;
      color: #fff;
      font-size: 0.9rem;
      font-family: 'Poppins', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-wrap input:focus { border-color: var(--purple); }
    .input-wrap input::placeholder { color: rgba(160,160,184,0.5); }

    .input-wrap .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0;
    }

    /* Forgot password */
    .forgot {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 16px;
    }

    .forgot a {
      font-size: 0.78rem;
      color: var(--purple-light);
      text-decoration: none;
    }

    .forgot a:hover { text-decoration: underline; }

    /* Terms */
    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 16px;
    }

    .terms-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--purple);
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .terms-row label {
      font-size: 0.78rem;
      color: var(--text2);
      line-height: 1.5;
    }

    .terms-row a { color: var(--purple-light); text-decoration: none; }

    /* Submit btn */
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit:hover { background: var(--purple2); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,58,237,0.4); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span { font-size: 0.75rem; color: var(--text2); white-space: nowrap; }

    /* Google btn */
    .btn-google {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
    }

    .btn-google:hover { border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.04); }

    .google-icon { width: 18px; height: 18px; }

    /* Alert messages */
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .alert.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; display: flex; }
    .alert.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; display: flex; }
    .alert.hidden { display: none !important; }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Password strength */
    .strength-bar {
      height: 4px;
      border-radius: 4px;
      background: var(--border);
      margin-top: 6px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }

    .strength-text { font-size: 0.7rem; color: var(--text2); margin-top: 3px; }

    /* Back to home */
    .back-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--text2);
    }

    .back-link a { color: var(--purple-light); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }

    /* Responsive */
    @media (max-width: 480px) {
      .auth-card { padding: 28px 20px; }
    }

    /* Form sections */
    .form-section { display: none; }
    .form-section.active { display: block; }

    /* Reset password modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
    }

    .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .modal p { font-size: 0.82rem; color: var(--text2); margin-bottom: 20px; }

    .modal-btns { display: flex; gap: 10px; margin-top: 16px; }

    .btn-cancel {
      flex: 1;
      padding: 11px;
      background: transparent;
      border: 1.5px solid var(--border);
      color: #fff;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-reset {
      flex: 1;
      padding: 11px;
      background: var(--purple);
      border: none;
      color: #fff;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-reset:hover { background: var(--purple2); }
  </style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>

<!-- Forgot Password Modal -->
<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <h3>🔑 Reset Password</h3>
    <p>আপনার email এ একটি reset link পাঠানো হবে।</p>
    <div class="input-group">
      <div class="input-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" id="resetEmail" placeholder="Your email address"/>
      </div>
    </div>
    <div class="alert" id="resetAlert"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-reset" onclick="sendReset()">Send Link</button>
    </div>
  </div>
</div>

<div class="auth-wrapper">
  <a href="index.html" class="logo">
    <div class="logo-icon"><i class="fas fa-bolt"></i></div>
    EARNIFY
  </a>

  <div class="auth-card">
    <!-- Tabs -->
    <div class="tab-row">
      <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>
      <button class="tab-btn" id="signupTab" onclick="switchTab('signup')">
        <i class="fas fa-user-plus"></i> Sign Up
      </button>
    </div>

    <!-- ===== LOGIN FORM ===== -->
    <div class="form-section active" id="loginForm">
      <div class="form-title">Welcome Back! 👋</div>
      <div class="form-sub">আপনার account এ login করুন</div>

      <div class="alert" id="loginAlert"></div>

      <div class="input-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="loginEmail" placeholder="example@email.com"/>
        </div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="আপনার password"/>
          <button class="eye-btn" onclick="togglePass('loginPassword', this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="forgot">
        <a href="#" onclick="openModal()">Forgot Password?</a>
      </div>

      <button class="btn-submit" id="loginBtn" onclick="doLogin()">
        <div class="spinner" id="loginSpinner"></div>
        <span id="loginBtnText"><i class="fas fa-sign-in-alt"></i> Login</span>
      </button>

      <div class="divider"><span>অথবা</span></div>

      <button class="btn-google" onclick="doGoogleLogin()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google দিয়ে Login করুন
      </button>
    </div>

    <!-- ===== SIGNUP FORM ===== -->
    <div class="form-section" id="signupForm">
      <div class="form-title">Join Earnify! 🚀</div>
      <div class="form-sub">আজই free account খুলুন</div>

      <div class="alert" id="signupAlert"></div>

      <div class="input-group">
        <label>Full Name</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" id="signupName" placeholder="আপনার পুরো নাম"/>
        </div>
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" id="signupEmail" placeholder="example@email.com"/>
        </div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="signupPassword" placeholder="শক্তিশালী password দিন" oninput="checkStrength(this.value)"/>
          <button class="eye-btn" onclick="togglePass('signupPassword', this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-text" id="strengthText"></div>
      </div>

      <div class="input-group">
        <label>Referral Code <span style="color:var(--text2);font-weight:400">(Optional)</span></label>
        <div class="input-wrap">
          <i class="fas fa-gift"></i>
          <input type="text" id="signupRef" placeholder="Referral code (থাকলে)"/>
        </div>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="termsCheck"/>
        <label for="termsCheck">
          আমি <a href="#">Terms & Conditions</a> এবং <a href="#">Privacy Policy</a> এর সাথে একমত
        </label>
      </div>

      <button class="btn-submit" id="signupBtn" onclick="doSignup()">
        <div class="spinner" id="signupSpinner"></div>
        <span id="signupBtnText"><i class="fas fa-user-plus"></i> Create Account</span>
      </button>

      <div class="divider"><span>অথবা</span></div>

      <button class="btn-google" onclick="doGoogleLogin()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google দিয়ে Sign Up করুন
      </button>
    </div>
  </div>

  <div class="back-link">
    <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    updateProfile,
    GoogleAuthProvider,
    signInWithPopup,
    sendPasswordResetEmail,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ============================================================
  // 🔥 আপনার Firebase Config এখানে বসান
  // Firebase Console → Project Settings → Your Apps → Config
  // ============================================================
  const firebaseConfig = {
    apiKey: "AIzaSyDZqFIWR7sC5z5ARdhEbhxQD8aBKDJVWpc",
    authDomain: "earnflow-898a9.firebaseapp.com",
    databaseURL: "https://earnflow-898a9-default-rtdb.firebaseio.com",
    projectId: "earnflow-898a9",
    storageBucket: "earnflow-898a9.firebasestorage.app",
    messagingSenderId: "80482930987",
    appId: "1:80482930987:web:c3e2443e95eed58284356e",
    measurementId: "G-97K5Y0VVM3"
  };
  // ============================================================

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();

  // Check if already logged in
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = "dashboard.html";
    }
  });

  // Save user to Firestore
  async function saveUserToDb(user, extraData = {}) {
    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      await setDoc(ref, {
        uid: user.uid,
        name: user.displayName || extraData.name || "User",
        email: user.email,
        referralCode: extraData.refCode || "",
        balance: 0,
        tasksCompleted: 0,
        referrals: 0,
        createdAt: serverTimestamp()
      });
    }
  }

  // ===== LOGIN =====
  window.doLogin = async function () {
    const email = document.getElementById("loginEmail").value.trim();
    const pass = document.getElementById("loginPassword").value;
    const alertEl = document.getElementById("loginAlert");

    if (!email || !pass) { showAlert(alertEl, "error", "Email এবং Password দিন।"); return; }

    setLoading("login", true);
    hideAlert(alertEl);

    try {
      await signInWithEmailAndPassword(auth, email, pass);
      showAlert(alertEl, "success", "✅ Login সফল! Dashboard এ যাচ্ছেন...");
      setTimeout(() => window.location.href = "dashboard.html", 1200);
    } catch (e) {
      showAlert(alertEl, "error", firebaseError(e.code));
      setLoading("login", false);
    }
  };

  // ===== SIGNUP =====
  window.doSignup = async function () {
    const name = document.getElementById("signupName").value.trim();
    const email = document.getElementById("signupEmail").value.trim();
    const pass = document.getElementById("signupPassword").value;
    const refCode = document.getElementById("signupRef").value.trim();
    const terms = document.getElementById("termsCheck").checked;
    const alertEl = document.getElementById("signupAlert");

    if (!name) { showAlert(alertEl, "error", "আপনার নাম দিন।"); return; }
    if (!email) { showAlert(alertEl, "error", "Email দিন।"); return; }
    if (pass.length < 6) { showAlert(alertEl, "error", "Password কমপক্ষে ৬ অক্ষরের হতে হবে।"); return; }
    if (!terms) { showAlert(alertEl, "error", "Terms & Conditions এ agree করুন।"); return; }

    setLoading("signup", true);
    hideAlert(alertEl);

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await updateProfile(cred.user, { displayName: name });
      await saveUserToDb(cred.user, { name, refCode });
      showAlert(alertEl, "success", "🎉 Account তৈরি হয়েছে! Dashboard এ যাচ্ছেন...");
      setTimeout(() => window.location.href = "dashboard.html", 1200);
    } catch (e) {
      showAlert(alertEl, "error", firebaseError(e.code));
      setLoading("signup", false);
    }
  };

  // ===== GOOGLE LOGIN =====
  window.doGoogleLogin = async function () {
    try {
      const result = await signInWithPopup(auth, googleProvider);
      await saveUserToDb(result.user);
      window.location.href = "dashboard.html";
    } catch (e) {
      const alertEl = document.getElementById(
        document.getElementById("loginForm").classList.contains("active") ? "loginAlert" : "signupAlert"
      );
      showAlert(alertEl, "error", firebaseError(e.code));
    }
  };

  // ===== PASSWORD RESET =====
  window.sendReset = async function () {
    const email = document.getElementById("resetEmail").value.trim();
    const alertEl = document.getElementById("resetAlert");
    if (!email) { showAlert(alertEl, "error", "Email দিন।"); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showAlert(alertEl, "success", "✅ Reset link পাঠানো হয়েছে। Email চেক করুন।");
    } catch (e) {
      showAlert(alertEl, "error", firebaseError(e.code));
    }
  };

  // ===== HELPERS =====
  function showAlert(el, type, msg) {
    el.className = `alert ${type}`;
    el.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
  }

  function hideAlert(el) { el.className = "alert hidden"; }

  function setLoading(form, state) {
    const btn = document.getElementById(`${form}Btn`);
    const spinner = document.getElementById(`${form}Spinner`);
    const text = document.getElementById(`${form}BtnText`);
    btn.disabled = state;
    spinner.style.display = state ? "block" : "none";
    text.style.display = state ? "none" : "flex";
  }

  function firebaseError(code) {
    const map = {
      "auth/user-not-found": "এই email এ কোনো account নেই।",
      "auth/wrong-password": "Password ভুল হয়েছে।",
      "auth/email-already-in-use": "এই email দিয়ে আগেই account আছে।",
      "auth/invalid-email": "Email address সঠিক নয়।",
      "auth/weak-password": "Password অনেক দুর্বল।",
      "auth/too-many-requests": "অনেকবার চেষ্টা করা হয়েছে। কিছুক্ষণ পর আবার try করুন।",
      "auth/popup-closed-by-user": "Google login বাতিল হয়েছে।",
      "auth/network-request-failed": "Internet connection check করুন।",
      "auth/invalid-credential": "Email বা Password ভুল হয়েছে।",
    };
    return map[code] || "কিছু একটা সমস্যা হয়েছে। আবার চেষ্টা করুন।";
  }
</script>

<script>
  // Tab switch
  function switchTab(tab) {
    document.getElementById("loginForm").classList.toggle("active", tab === "login");
    document.getElementById("signupForm").classList.toggle("active", tab === "signup");
    document.getElementById("loginTab").classList.toggle("active", tab === "login");
    document.getElementById("signupTab").classList.toggle("active", tab === "signup");
  }

  // Toggle password visibility
  function togglePass(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector("i");
    if (input.type === "password") {
      input.type = "text";
      icon.className = "fas fa-eye-slash";
    } else {
      input.type = "password";
      icon.className = "fas fa-eye";
    }
  }

  // Password strength
  function checkStrength(val) {
    const fill = document.getElementById("strengthFill");
    const text = document.getElementById("strengthText");
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const levels = [
      { w: "0%", c: "transparent", t: "" },
      { w: "25%", c: "#ef4444", t: "দুর্বল" },
      { w: "50%", c: "#f59e0b", t: "মাঝারি" },
      { w: "75%", c: "#3b82f6", t: "ভালো" },
      { w: "100%", c: "#22c55e", t: "শক্তিশালী 💪" },
    ];
    const lvl = levels[Math.min(score, 4)];
    fill.style.width = lvl.w;
    fill.style.background = lvl.c;
    text.textContent = lvl.t;
    text.style.color = lvl.c;
  }

  // Modal
  function openModal() { document.getElementById("resetModal").classList.add("open"); }
  function closeModal() { document.getElementById("resetModal").classList.remove("open"); }

  // Enter key support
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      if (document.getElementById("loginForm").classList.contains("active")) {
        window.doLogin && window.doLogin();
      } else {
        window.doSignup && window.doSignup();
      }
    }
  });
</script>
</body>
</html>
